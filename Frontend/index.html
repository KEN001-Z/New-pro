<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Cash</title>
  <link rel="stylesheet" href="login page.css" />
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo-box">
      <div class="logo">S</div>
    </div>

    <h1>Smart Cash</h1>
    <p class="subtitle">Sign in to your account</p>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="loginTab">Login</button>
      <button class="tab" id="registerTab">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="form active-form">

      <h3>Sign in to continue with your dashboard</h3>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" placeholder="080 0000 0000" required />
      </div>

      <div class="input-group">
        <label>Password</label>

        <div class="password-box">
          <input type="password" id="loginPassword" placeholder="••••••••" required />
          <span class="toggle" onclick="togglePassword('loginPassword')">👁</span>
        </div>
      </div>

      <div class="remember">
        <input type="checkbox" />
        <span>Remember me</span>
      </div>

      <button type="submit" class="btn">Login</button>

    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="form">

      <h3>Create your Smart Cash account</h3>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter full name" required />
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="text" placeholder="080 0000 0000" required />
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter email" required />
      </div>

      <div class="input-group">
        <label>Password</label>

        <div class="password-box">
          <input type="password" id="registerPassword" placeholder="Create password" required />
          <span class="toggle" onclick="togglePassword('registerPassword')">👁</span>
        </div>
      </div>

      <button type="submit" class="btn">Register</button>

    </form>

  </div>

  <script>

    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    // TAB SWITCHING
    loginTab.addEventListener("click", () => {

      loginTab.classList.add("active");
      registerTab.classList.remove("active");

      loginForm.classList.add("active-form");
      registerForm.classList.remove("active-form");

    });

    registerTab.addEventListener("click", () => {

      registerTab.classList.add("active");
      loginTab.classList.remove("active");

      registerForm.classList.add("active-form");
      loginForm.classList.remove("active-form");

    });

    // PASSWORD SHOW/HIDE
    function togglePassword(id) {

      const input = document.getElementById(id);

      if (input.type === "password") {
        input.type = "text";
      } else {
        input.type = "password";
      }

    }
// LOGIN
loginForm.addEventListener("submit", function(e) {

  e.preventDefault();

  const phone = document.querySelector("#loginForm input[type='text']").value;

  const password = document.getElementById("loginPassword").value;

  // Get saved account
  const savedPhone = localStorage.getItem("phone");

  const savedPassword = localStorage.getItem("password");

  // Check login
  if(phone === savedPhone && password === savedPassword){

    alert("Login Successful!");

    window.location.href = "welcome page.html";

  } else {

    alert("Wrong details or account does not exist!");

  }

});


// REGISTER
registerForm.addEventListener("submit", function(e) {

  e.preventDefault();

  const inputs = registerForm.querySelectorAll("input");

  const phone = inputs[1].value;

  const password = document.getElementById("registerPassword").value;

  // Save user details
  localStorage.setItem("phone", phone);

  localStorage.setItem("password", password);

  alert("Registration Successful!");

  // Switch to login tab
  loginTab.click();

});
</script>

</body>
</html>
